<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="410pages" />
  <title>410pages</title>
  <script>
    (function () {
      const preferencesKey = 'user-preferences';
      const legacyThemeKey = 'theme-preference';
      const legacyDarkModeKey = 'dark-mode';
      const root = document.documentElement;
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const defaultPreferences = { theme: 'system', fontFamily: 'pretendard', textScale: 'md' };
      const textScaleMap = { sm: '0.9375', md: '1', lg: '1.125' };
      let preferences = defaultPreferences;

      try {
        const storedPreferences = localStorage.getItem(preferencesKey);
        if (storedPreferences) {
          let parsedPreferences;

          try {
            parsedPreferences = JSON.parse(storedPreferences);
          } catch (_) {
            localStorage.removeItem(preferencesKey);
          }

          preferences = {
            theme:
              parsedPreferences?.theme === 'light' || parsedPreferences?.theme === 'dark' || parsedPreferences?.theme === 'system'
                ? parsedPreferences.theme
                : defaultPreferences.theme,
            fontFamily:
              parsedPreferences?.fontFamily === 'serif' || parsedPreferences?.fontFamily === 'pretendard'
                ? parsedPreferences.fontFamily
                : defaultPreferences.fontFamily,
            textScale:
              parsedPreferences?.textScale === 'sm' || parsedPreferences?.textScale === 'lg' || parsedPreferences?.textScale === 'md'
                ? parsedPreferences.textScale
                : defaultPreferences.textScale,
          };
        }

        if (!storedPreferences || preferences === defaultPreferences) {
          const legacyTheme = localStorage.getItem(legacyThemeKey);
          if (legacyTheme === 'system' || legacyTheme === 'light' || legacyTheme === 'dark') {
            preferences = { ...defaultPreferences, theme: legacyTheme };
          } else {
            const legacyDarkMode = localStorage.getItem(legacyDarkModeKey);
            if (legacyDarkMode !== null) {
              preferences = {
                ...defaultPreferences,
                theme: JSON.parse(legacyDarkMode) ? 'dark' : 'light',
              };
            }
          }
        }
        localStorage.setItem(legacyThemeKey, preferences.theme);
      } catch (_) {
        preferences = defaultPreferences;
      }

      const isDark = preferences.theme === 'dark' || (preferences.theme === 'system' && prefersDark);
      root.classList.toggle('dark', isDark);
      root.dataset.font = preferences.fontFamily;
      root.style.setProperty('--text-scale', textScaleMap[preferences.textScale] || '1');
      const themeMeta = document.querySelector('meta[name="theme-color"]');
      if (themeMeta) {
        themeMeta.setAttribute('content', isDark ? '#191919' : '#ffffff');
      }
    })();
  </script>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="/pwa-icon.svg">
  <link rel="apple-touch-icon" href="/pwa-icon.svg">
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
