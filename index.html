<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="410pages" />
  <title>410pages</title>
  <script type="module">
    import { DEFAULT_FONT_ID, FONT_IDS } from '/lib/fontRegistry.ts';

    (function () {
      const preferencesKey = 'user-preferences';
      const legacyThemeKey = 'theme-preference';
      const legacyDarkModeKey = 'dark-mode';
      const supportedFonts = new Set(FONT_IDS);
      const minBaseFontPt = 10;
      const maxBaseFontPt = 40;
      const root = document.documentElement;
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const defaultPreferences = { theme: 'system', fontFamily: DEFAULT_FONT_ID, baseFontPt: 16 };
      const legacyTextScaleMap = { sm: 14, md: 16, lg: 18 };

      const clampBaseFontPt = (value) => {
        const parsedValue = Number(value);

        if (!Number.isFinite(parsedValue)) {
          return defaultPreferences.baseFontPt;
        }

        return Math.min(maxBaseFontPt, Math.max(minBaseFontPt, Math.round(parsedValue)));
      };

      const normalizePreferences = (value) => {
        const candidate = value && typeof value === 'object' ? value : {};

        return {
          theme:
            candidate.theme === 'light' || candidate.theme === 'dark' || candidate.theme === 'system'
              ? candidate.theme
              : defaultPreferences.theme,
          fontFamily: supportedFonts.has(candidate.fontFamily)
            ? candidate.fontFamily
            : defaultPreferences.fontFamily,
          baseFontPt:
            candidate.baseFontPt !== undefined
              ? clampBaseFontPt(candidate.baseFontPt)
              : legacyTextScaleMap[candidate.textScale] || defaultPreferences.baseFontPt,
        };
      };

      let preferences = defaultPreferences;

      try {
        const storedPreferences = localStorage.getItem(preferencesKey);
        let hasStoredPreferences = false;

        if (storedPreferences) {
          try {
            preferences = normalizePreferences(JSON.parse(storedPreferences));
            hasStoredPreferences = true;
          } catch (_) {
            localStorage.removeItem(preferencesKey);
          }
        }

        if (!hasStoredPreferences) {
          const legacyTheme = localStorage.getItem(legacyThemeKey);
          if (legacyTheme === 'system' || legacyTheme === 'light' || legacyTheme === 'dark') {
            preferences = { ...defaultPreferences, theme: legacyTheme };
          } else {
            const legacyDarkMode = localStorage.getItem(legacyDarkModeKey);
            if (legacyDarkMode !== null) {
              preferences = {
                ...defaultPreferences,
                theme: JSON.parse(legacyDarkMode) ? 'dark' : 'light',
              };
            }
          }
        }
      } catch (_) {
        preferences = defaultPreferences;
      }

      try {
        localStorage.setItem(preferencesKey, JSON.stringify(preferences));
        localStorage.setItem(legacyThemeKey, preferences.theme);
        localStorage.removeItem(legacyDarkModeKey);
      } catch (_) {
      }

      const isDark = preferences.theme === 'dark' || (preferences.theme === 'system' && prefersDark);
      root.classList.toggle('dark', isDark);
      root.dataset.font = preferences.fontFamily;
      root.style.setProperty('--font-base-pt', `${preferences.baseFontPt}pt`);
      const themeMeta = document.querySelector('meta[name="theme-color"]');
      if (themeMeta) {
        themeMeta.setAttribute('content', isDark ? '#191919' : '#ffffff');
      }
    })();
  </script>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="/pwa-icon.svg">
  <link rel="apple-touch-icon" href="/pwa-icon.svg">
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
