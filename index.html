<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="410pages" />
  <title>410pages</title>
  <script>
    (function () {
      const preferencesKey = 'user-preferences';
      const legacyThemeKey = 'theme-preference';
      const legacyDarkModeKey = 'dark-mode';
      const supportedFonts = new Set([
        'pretendard',
        'serif',
        'noto-sans-kr',
        'ibm-plex-sans-kr',
        'gothic-a1',
        'gowun-dodum',
        'nanum-gothic',
        'nanum-myeongjo',
        'gowun-batang',
        'hahmlet',
        'song-myung',
        'sunflower',
        'nanum-gothic-coding',
        'jetbrains-mono',
        'fira-code',
        'source-code-pro',
        'roboto-mono',
        'do-hyeon',
        'jua',
        'black-han-sans',
      ]);
      const minBaseFontPt = 10;
      const maxBaseFontPt = 40;
      const minCitationWidthRem = 35;
      const maxCitationWidthRem = 50;
      const root = document.documentElement;
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const defaultPreferences = {
        theme: 'auto',
        fontFamily: 'pretendard',
        baseFontPt: 13,
        citationWidthRem: 44,
      };
      const supportedThemes = new Set([
        'auto',
        'day',
        'night',
        'warm-paper',
        'soft-slate',
        'terminal-green',
      ]);
      const legacyThemeMap = {
        system: 'auto',
        light: 'day',
        dark: 'night',
      };
      const legacyTextScaleMap = { sm: 14, md: 16, lg: 18 };
      const themeColorByResolvedTheme = {
        day: '#f8f7f5',
        night: '#181614',
        'warm-paper': '#f7f1e8',
        'soft-slate': '#f4f7f8',
        'terminal-green': '#07100a',
      };

      const clampBaseFontPt = (value) => {
        const parsedValue = Number(value);

        if (!Number.isFinite(parsedValue)) {
          return defaultPreferences.baseFontPt;
        }

        return Math.min(maxBaseFontPt, Math.max(minBaseFontPt, Math.round(parsedValue)));
      };

      const clampCitationWidthRem = (value) => {
        const parsedValue = Number(value);

        if (!Number.isFinite(parsedValue)) {
          return defaultPreferences.citationWidthRem;
        }

        return Math.min(maxCitationWidthRem, Math.max(minCitationWidthRem, Math.round(parsedValue)));
      };

      const normalizePreferences = (value) => {
        const candidate = value && typeof value === 'object' ? value : {};
        const normalizedTheme =
          supportedThemes.has(candidate.theme)
            ? candidate.theme
            : legacyThemeMap[candidate.theme] || defaultPreferences.theme;

        return {
          theme: normalizedTheme,
          fontFamily: supportedFonts.has(candidate.fontFamily)
            ? candidate.fontFamily
            : defaultPreferences.fontFamily,
          baseFontPt:
            candidate.baseFontPt !== undefined
              ? clampBaseFontPt(candidate.baseFontPt)
              : legacyTextScaleMap[candidate.textScale] ?? defaultPreferences.baseFontPt,
          citationWidthRem: clampCitationWidthRem(candidate.citationWidthRem),
        };
      };

      const resolveTheme = (theme) => (theme === 'auto' ? (prefersDark ? 'night' : 'day') : theme);

      let preferences = defaultPreferences;

      try {
        const storedPreferences = localStorage.getItem(preferencesKey);
        let hasStoredPreferences = false;

        if (storedPreferences) {
          try {
            preferences = normalizePreferences(JSON.parse(storedPreferences));
            hasStoredPreferences = true;
          } catch (_) {
            localStorage.removeItem(preferencesKey);
          }
        }

        if (!hasStoredPreferences) {
          const legacyTheme = localStorage.getItem(legacyThemeKey);
          if (legacyTheme) {
            preferences = {
              ...defaultPreferences,
              theme: supportedThemes.has(legacyTheme)
                ? legacyTheme
                : legacyThemeMap[legacyTheme] || defaultPreferences.theme,
            };
          } else {
            const legacyDarkMode = localStorage.getItem(legacyDarkModeKey);
            if (legacyDarkMode !== null) {
              preferences = {
                ...defaultPreferences,
                theme: JSON.parse(legacyDarkMode) ? 'night' : 'day',
              };
            }
          }
        }
      } catch (_) {
        preferences = defaultPreferences;
      }

      try {
        localStorage.setItem(preferencesKey, JSON.stringify(preferences));
        localStorage.setItem(legacyThemeKey, preferences.theme);
        localStorage.removeItem(legacyDarkModeKey);
      } catch (_) {
      }

      const resolvedTheme = resolveTheme(preferences.theme);
      const isDark = resolvedTheme === 'night' || resolvedTheme === 'terminal-green';
      root.classList.toggle('dark', isDark);
      root.dataset.theme = resolvedTheme;
      root.dataset.font = preferences.fontFamily;
      root.style.setProperty('--font-base-pt', `${preferences.baseFontPt}pt`);
      root.style.setProperty('--citation-column-width', `${preferences.citationWidthRem}rem`);
      root.style.colorScheme = isDark ? 'dark' : 'light';
      const themeMeta = document.querySelector('meta[name="theme-color"]');
      if (themeMeta) {
        themeMeta.setAttribute('content', themeColorByResolvedTheme[resolvedTheme] || themeColorByResolvedTheme.day);
      }
    })();
  </script>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="/pwa-icon.svg">
  <link rel="apple-touch-icon" href="/pwa-icon.svg">
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
